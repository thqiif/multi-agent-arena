<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent Chat Arena</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    .app { display: flex; height: 100vh; }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    .sidebar h2 { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .persona-list { flex: 1; overflow-y: auto; }
    .persona-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .persona-item:hover { border-color: var(--accent); }
    .persona-item.selected { border-color: var(--accent); background: rgba(88, 166, 255, 0.1); }
    .persona-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .persona-dot { width: 10px; height: 10px; border-radius: 50%; }
    .persona-name { font-weight: 600; font-size: 14px; }
    .persona-preview { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--border); }
    .btn-danger { background: var(--danger); }
    .btn-small { padding: 4px 8px; font-size: 11px; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }
    
    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-title { font-weight: 600; font-size: 16px; }
    .chat-actions { display: flex; gap: 8px; }
    
    /* Messages */
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
    .message { margin-bottom: 16px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .message-role { font-weight: 600; font-size: 13px; }
    .message-time { font-size: 11px; color: var(--text-dim); }
    .message-content { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .message.user .message-content { color: var(--text); }
    .message.agent .message-content { color: var(--text-dim); }
    .bid-info { font-size: 11px; color: var(--warning); margin-top: 4px; }
    
    /* Input */
    .chat-input {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    .chat-input input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input button { padding: 12px 24px; }
    
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%; max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal h3 { margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--accent); outline: none;
    }
    .modal flex; gap:-actions { display: 12px; justify-content: flex-end; margin-top: 20px; }
    
    /* Settings */
    .settings-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .settings-row label { min-width: 80px; font-size: 13px; }
    .settings-row input { flex: 1; }
    
    /* Toast */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 200;
      transform: translateY(100px); opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
    
    /* Color picker */
    .color-options { display: flex; gap: 6px; flex-wrap: wrap; }
    .color-option {
      width: 24px; height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .color-option.selected { border-color: #fff; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <h2>Personas</h2>
      <div class="persona-list" id="personaList"></div>
      <div class="btn-group">
        <button class="btn" onclick="openPersonaModal()">+ Add</button>
        <button class="btn btn-secondary" onclick="openSettingsModal()">⚙️</button>
      </div>
    </div>
    <div class="main">
      <div class="chat-header">
        <div class="chat-title">💬 Multi-Agent Arena</div>
        <div class="chat-actions">
          <button class="btn btn-secondary btn-small" onclick="exportData()">Export</button>
          <button class="btn btn-secondary btn-small" onclick="importData()">Import</button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKeypress(event)">
        <button class="btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <!-- Persona Modal -->
  <div class="modal-overlay" id="personaModal">
    <div class="modal">
      <h3 id="personaModalTitle">Add Persona</h3>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="personaName" placeholder="e.g., Business Analyst">
      </div>
      <div class="form-group">
        <label>Color</label>
        <div class="color-options" id="colorOptions"></div>
      </div>
      <div class="form-group">
        <label>System Prompt</label>
        <textarea id="personaPrompt" placeholder="You are a..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closePersonaModal()">Cancel</button>
        <button class="btn btn-danger" id="deletePersonaBtn" onclick="deletePersona()" style="display:none">Delete</button>
        <button class="btn" onclick="savePersona()">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h3>Settings</h3>
      <div class="form-group">
        <label>OpenAI API Key</label>
        <input type="password" id="openaiKey" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>Anthropic API Key</label>
        <input type="password" id="anthropicKey" placeholder="sk-ant-...">
      </div>
      <div class="form-group">
        <label>Model</label>
        <select id="modelSelect">
          <option value="gpt-4o">GPT-4o</option>
          <option value="gpt-4">GPT-4</option>
          <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
          <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
          <option value="claude-3-opus-20240229">Claude 3 Opus</option>
          <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bid Threshold (0-1)</label>
        <input type="number" id="threshold" value="0.7" min="0" max="1" step="0.05">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeSettingsModal()">Close</button>
        <button class="btn" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <!-- Import -->
  <input type="file" id="importFile" style="display:none" accept=".json" onchange="handleImport(event)">

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // State
    let state = {
      personas: [],
      messages: [],
      settings: {
        openaiKey: '',
        anthropicKey: '',
        model: 'gpt-4o',
        threshold: 0.7
      },
      editingPersonaId: null
    };

    const COLORS = ['#f85149', '#ff7b72', '#ffa657', '#d29922', '#3fb950', '#56d4dd', '#58a6ff', '#bc8cff', '#ff9ece', '#a371f7'];

    // Init
    function init() {
      loadState();
      renderPersonaList();
      renderMessages();
      renderColorOptions();
      loadSettingsToModal();
    }

    // Storage
    function loadState() {
      try {
        const saved = localStorage.getItem('multiAgentArena');
        if (saved) {
          state = JSON.parse(saved);
        }
      } catch(e) { console.error('Load error:', e); }
    }

    function saveState() {
      localStorage.setItem('multiAgentArena', JSON.stringify(state));
    }

    // Render
    function renderPersonaList() {
      const list = document.getElementById('personaList');
      list.innerHTML = state.personas.map(p => `
        <div class="persona-item" onclick="selectPersona('${p.id}')">
          <div class="persona-header">
            <div class="persona-dot" style="background:${p.color}"></div>
            <div class="persona-name">${escapeHtml(p.name)}</div>
          </div>
          <div class="persona-preview">${escapeHtml(p.systemPrompt.slice(0, 50))}...</div>
        </div>
      `).join('');
    }

    function renderMessages() {
      const container = document.getElementById('chatMessages');
      container.innerHTML = state.messages.map(m => {
        const persona = state.personas.find(p => p.id === m.personaId);
        const name = m.role === 'user' ? 'You' : (persona?.name || 'Unknown');
        const color = persona?.color || '#58a6ff';
        return `
          <div class="message ${m.role}">
            <div class="message-header">
              <span class="message-role" style="color:${color}">${escapeHtml(name)}</span>
              <span class="message-time">${formatTime(m.timestamp)}</span>
            </div>
            <div class="message-content">${escapeHtml(m.content)}</div>
            ${m.bid ? `<div class="bid-info">Confidence: ${m.bid.confidence} — ${escapeHtml(m.bid.reason)}</div>` : ''}
          </div>
        `;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function renderColorOptions() {
      const container = document.getElementById('colorOptions');
      container.innerHTML = COLORS.map(c => `
        <div class="color-option ${state.personas.find(p => p.color === c) ? '' : ''}" 
             style="background:${c}" onclick="selectColor('${c}')"></div>
      `).join('');
    }

    // Actions
    function selectPersona(id) {
      const p = state.personas.find(p => p.id === id);
      if (!p) return;
      document.getElementById('personaName').value = p.name;
      document.getElementById('personaPrompt').value = p.systemPrompt;
      state.selectedColor = p.color;
      state.editingPersonaId = id;
      document.getElementById('personaModalTitle').innerText = 'Edit Persona';
      document.getElementById('deletePersonaBtn').style.display = 'block';
      updateColorSelection();
      openModal('personaModal');
    }

    let selectedColor = COLORS[0];
    function selectColor(c) {
      selectedColor = c;
      updateColorSelection();
    }
    function updateColorSelection() {
      document.querySelectorAll('.color-option').forEach(el => {
        el.classList.toggle('selected', el.style.background === selectedColor);
      });
    }

    function openPersonaModal() {
      state.editingPersonaId = null;
      document.getElementById('personaName').value = '';
      document.getElementById('personaPrompt').value = '';
      document.getElementById('personaModalTitle').innerText = 'Add Persona';
      document.getElementById('deletePersonaBtn').style.display = 'none';
      selectedColor = COLORS.find(c => !state.personas.find(p => p.color === c)) || COLORS[0];
      updateColorSelection();
      openModal('personaModal');
    }

    function savePersona() {
      const name = document.getElementById('personaName').value.trim();
      const prompt = document.getElementById('personaPrompt').value.trim();
      if (!name || !prompt) { showToast('Name and prompt required', 'error'); return; }

      if (state.editingPersonaId) {
        const p = state.personas.find(p => p.id === state.editingPersonaId);
        if (p) { p.name = name; p.systemPrompt = prompt; p.color = selectedColor; }
      } else {
        state.personas.push({
          id: Date.now().toString(),
          name,
          systemPrompt: prompt,
          color: selectedColor
        });
      }
      saveState();
      renderPersonaList();
      closeModal('personaModal');
      showToast('Persona saved', 'success');
    }

    function deletePersona() {
      if (!state.editingPersonaId) return;
      state.personas = state.personas.filter(p => p.id !== state.editingPersonaId);
      saveState();
      renderPersonaList();
      closeModal('personaModal');
      showToast('Persona deleted', 'success');
    }

    // Settings
    function openSettingsModal() {
      loadSettingsToModal();
      openModal('settingsModal');
    }

    function loadSettingsToModal() {
      document.getElementById('openaiKey').value = state.settings.openaiKey;
      document.getElementById('anthropicKey').value = state.settings.anthropicKey;
      document.getElementById('modelSelect').value = state.settings.model;
      document.getElementById('threshold').value = state.settings.threshold;
    }

    function saveSettings() {
      state.settings.openaiKey = document.getElementById('openaiKey').value.trim();
      state.settings.anthropicKey = document.getElementById('anthropicKey').value.trim();
      state.settings.model = document.getElementById('modelSelect').value;
      state.settings.threshold = parseFloat(document.getElementById('threshold').value);
      saveState();
      closeModal('settingsModal');
      showToast('Settings saved', 'success');
    }

    // Chat
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const content = input.value.trim();
      if (!content) return;

      // Add user message
      state.messages.push({
        id: Date.now().toString(),
        role: 'user',
        personaId: null,
        content,
        timestamp: Date.now()
      });
      input.value = '';
      saveState();
      renderMessages();

      // Run bidding
      await runBidding(content);
    }

    async function runBidding(topic) {
      const enabledPersonas = state.personas.filter(p => p);
      if (enabledPersonas.length === 0) { showToast('No personas defined', 'error'); return; }

      // Check API key
      const key = state.settings.openaiKey || state.settings.anthropicKey;
      if (!key) { showToast('Please add API key in settings', 'error'); return; }

      const bids = [];
      for (const persona of enabledPersonas) {
        const bid = await evaluateBid(persona, topic);
        bids.push({ persona, ...bid });
      }

      // Filter by threshold
      const winners = bids.filter(b => b.shouldSpeak && b.confidence >= state.settings.threshold);
      
      if (winners.length === 0) {
        showToast('No agents wanted to speak (threshold too high?)', 'error');
        return;
      }

      // Generate responses
      for (const winner of winners) {
        await generateResponse(winner.persona, topic, winner);
      }
    }

    async function evaluateBid(persona, topic) {
      const prompt = `You are "${persona.name}". ${persona.systemPrompt}

Evaluate whether you have something valuable to say about this topic:
"${topic}"

Respond ONLY in this format:
SPEAK: yes/no
CONFIDENCE: 0.0-1.0
REASON: 1-sentence why`;

      const response = await callLLM(prompt);
      const lines = response.split('\n');
      let shouldSpeak = false, confidence = 0, reason = '';
      
      for (const line of lines) {
        if (line.startsWith('SPEAK:')) shouldSpeak = line.toLowerCase().includes('yes');
        if (line.startsWith('CONFIDENCE:')) confidence = parseFloat(line.split(':')[1]) || 0;
        if (line.startsWith('REASON:')) reason = line.slice(7).trim();
      }

      return { shouldSpeak, confidence, reason };
    }

    async function generateResponse(persona, topic, bid) {
      const prompt = `You are "${persona.name}". ${persona.systemPrompt}

The group is discussing:
"${topic}"

Write a 2-3 sentence response that adds value to the discussion. Be concise and stay in character.`;

      const content = await callLLM(prompt);
      
      state.messages.push({
        id: Date.now().toString(),
        role: 'agent',
        personaId: persona.id,
        content,
        timestamp: Date.now(),
        bid: { confidence: bid.confidence, reason: bid.reason }
      });
      saveState();
      renderMessages();
    }

    async function callLLM(userPrompt) {
      const { model, openaiKey, anthropicKey } = state.settings;
      
      if (openaiKey && (model.startsWith('gpt'))) {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${openaiKey}`
          },
          body: JSON.stringify({
            model,
            messages: [{ role: 'user', content: userPrompt }],
            temperature: 0.7
          })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || 'Error: ' + JSON.stringify(data);
      }
      
      if (anthropicKey && (model.startsWith('claude'))) {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': anthropicKey,
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model,
            max_tokens: 1024,
            messages: [{ role: 'user', content: userPrompt }]
          })
        });
        const data = await res.json();
        return data.content?.[0]?.text || 'Error: ' + JSON.stringify(data);
      }

      return 'Error: No valid API key configured';
    }

    // Export/Import
    function exportData() {
      const data = JSON.stringify(state, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `arena-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Exported!', 'success');
    }

    function importData() {
      document.getElementById('importFile').click();
    }

    function handleImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          state = JSON.parse(ev.target.result);
          saveState();
          renderPersonaList();
          renderMessages();
          showToast('Imported!', 'success');
        } catch(err) {
          showToast('Invalid JSON file', 'error');
        }
      };
      reader.readAsText(file);
    }

    // Utils
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    
    function handleKeypress(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Start
    init();
  </script>
</body>
</html>
